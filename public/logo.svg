<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .ic-bg   { fill: #2d2660; }
        .ic-ring { stroke: #4f46c8; }
        .ic-sym  { stroke: #c4bff7; }
        .ic-dot  { fill: #7c75e0; }
        .ic-step { stroke: #4f46c8; }
        .ic-spark { fill: #7c75e0; }
        .ic-spark-ring { stroke: #7c75e0; }
      }
    </style>
  </defs>
 
  <!-- Disc -->
  <circle class="ic-bg" cx="50" cy="50" r="44" fill="#4f46e5"/>
 
  <!-- Orbit ring -->
  <circle class="ic-ring" cx="50" cy="50" r="46" fill="none"
    stroke="#a5b4fc" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
 
  <!-- Sigma: top bar -->
  <path class="ic-sym" d="M28 26 L72 26"
    stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Sigma: bottom bar -->
  <path class="ic-sym" d="M28 74 L72 74"
    stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Sigma: top diagonal -->
  <path class="ic-sym" d="M28 26 L50 50"
    stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Sigma: bottom diagonal -->
  <path class="ic-sym" d="M50 50 L28 74"
    stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
 
  <!-- Step guide: dots -->
  <circle class="ic-dot" cx="72" cy="34" r="4"   fill="#c7d2fe"/>
  <circle class="ic-dot" cx="76" cy="50" r="3.5" fill="#c7d2fe"/>
  <circle class="ic-dot" cx="72" cy="66" r="3"   fill="#c7d2fe"/>
  <!-- Step guide: connecting curve -->
  <path class="ic-step" d="M72 34 Q78 42 76 50 Q74 58 72 66"
    fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round"/>
 
  <!-- AI spark dot -->
  <circle class="ic-spark" cx="68" cy="16" r="5" fill="#a5b4fc"/>
  <circle class="ic-spark-ring" cx="68" cy="16" r="9"
    fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0.45"/>
</svg>